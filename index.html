<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="sepal-fullwidth-header">
    <div class="sepal-nav-container">
        <div class="sepal-nav-left">
            <img src="https://yt3.ggpht.com/Cqo3gvBBFMWbIQujjFlZwrsRG7HdSXB0uG2rcDElMav7kc1ERmZGmOdf7w1NL2D1X_BF-XhjC37l=s800-c-fcrop64=1,00000000ffffffff-rw-nd-v1" alt="Sepal Logo" class="sepal-logo-img">
            <span class="sepal-nav-brand">SEPAL Online</span>
        </div>
        <div class="sepal-nav-right">
            <a href="#">Trang chủ</a>
            <a href="#">Giới thiệu</a>
            <a href="#">Điểm khác biệt</a>
            <a href="#">Tính năng</a>
            <a href="#">Phản hồi</a>
        </div>
    </div>
</div>

<div class="sepal-main-container">
    
    <div class="sepal-pro-wrapper">
        <div class="sepal-header-text">
            <h1 class="sepal-brand">SEPAL Online</h1>
            <p class="sepal-desc">Hệ thống hỗ trợ dự báo sớm kết quả học tập<br>và đưa ra khuyến nghị cá nhân hóa</p>
        </div>

        <form onsubmit="handleStaticLogin(event, 'student')" class="sepal-form-box">
            <div id="error-student" class="sepal-alert-error" style="display:none;"></div>

            <label class="sepal-label">Tên đăng nhập</label>
            <div class="sepal-input-container">
                <i class="fa-regular fa-user sepal-icon-left"></i>
                <input type="text" name="log" required placeholder="Nhập mã sinh viên / email" class="sepal-input-field">
            </div>

            <label class="sepal-label">Mật khẩu</label>
            <div class="sepal-input-container">
                <i class="fa-solid fa-lock sepal-icon-left"></i>
                <input type="password" name="pwd" id="sepal-pass-sv" required placeholder="••••••••" class="sepal-input-field">
                <i class="fa-regular fa-eye-slash sepal-icon-right" onclick="togglePassword('sepal-pass-sv', this)"></i>
            </div>

            <div class="sepal-remember">
                <input type="checkbox" name="rememberme" id="remember-check" value="forever" checked>
                <label for="remember-check">Ghi nhớ mật khẩu</label>
            </div>

            <button type="submit" class="sepal-submit-btn">Đăng nhập</button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <button onclick="openTeacherModal()" style="background:none; border:none; color:#475569; font-weight:700; cursor:pointer; font-size:14px; text-decoration:underline; font-family:'Inter',sans-serif;">
                <i class="fa-solid fa-user-shield"></i> Khu vực dành cho Cố vấn Học tập
            </button>
        </div>
    </div>

    <div class="sepal-image-col">
        <img src="https://yt3.ggpht.com/XHs5Y_nHdt0xEWpW2Sv7F5ZO1Ciuh6YuoZDj8ZdpiiwLc3g6wlco834fWXLZryLrDRkmX5S1TGuo8JU=s800-rw-nd-v1" alt="Illustration" class="sepal-illustration-img">
    </div>

</div>

<div id="teacher-modal" class="sepal-modal-overlay">
    <div class="sepal-modal-box">
        <button class="close-btn" onclick="closeTeacherModal()">×</button>
        <div style="text-align:center; margin-bottom:20px;">
            <h3 style="margin:0; color:#1e293b; font-weight:800; font-family:'Inter',sans-serif; font-size:24px;">XÁC THỰC CỐ VẤN</h3>
            <p style="font-size:14px; color:#64748b; font-family:'Inter',sans-serif;">Vui lòng đăng nhập tài khoản Giảng viên</p>
        </div>

        <form onsubmit="handleStaticLogin(event, 'teacher')" style="font-family:'Inter',sans-serif;">
            <div id="error-teacher" class="sepal-alert-error" style="display:none;"></div>

            <label class="sepal-label">Tài khoản Cố vấn</label>
            <div class="sepal-input-container" style="margin-bottom:15px;">
                <i class="fa-regular fa-user sepal-icon-left"></i>
                <input type="text" name="log" required placeholder="Username..." class="sepal-input-field">
            </div>

            <label class="sepal-label">Mật khẩu</label>
            <div class="sepal-input-container" style="margin-bottom:25px;">
                <i class="fa-solid fa-lock sepal-icon-left"></i>
                <input type="password" name="pwd" id="sepal-pass-gv" required placeholder="••••••••" class="sepal-input-field">
                <i class="fa-regular fa-eye-slash sepal-icon-right" onclick="togglePassword('sepal-pass-gv', this)"></i>
            </div>
            <button type="submit" class="sepal-submit-btn">XÁC NHẬN TRUY CẬP</button>
        </form>
    </div>
</div>

<style>
    /* CSS THÔNG BÁO LỖI NGẦM */
    .sepal-alert-error {
        background-color: #fef2f2;
        color: #dc2626;
        border: 1px solid #f87171;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 20px;
        line-height: 1.5;
        font-family: 'Inter', sans-serif;
    }

    /* HEADER */
    .sepal-fullwidth-header { width: 100vw; position: relative; left: 50%; transform: translateX(-50%); background-color: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 100; margin-top: 20px; }
    .sepal-nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0px 20px; }
    .sepal-nav-left { display: flex; align-items: center; gap: 15px; }
    .sepal-logo-img { height: 50px; width: auto; object-fit: contain; }
    .sepal-nav-brand { font-family: 'Inter', sans-serif; font-size: 26px; font-weight: 800; color: #003366; letter-spacing: -0.5px; }
    .sepal-nav-right { display: flex; gap: 25px; }
    .sepal-nav-right a { text-decoration: none; color: #475569; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; text-transform: uppercase; transition: color 0.2s; }
    .sepal-nav-right a:hover { color: #003366; }

    /* BỐ CỤC CHÍNH 2 CỘT */
    .sepal-main-container { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 60px auto; padding: 0 20px; gap: 60px; }

    /* CỘT FORM ĐĂNG NHẬP */
    .sepal-pro-wrapper { width: 100%; max-width: 420px; padding: 40px 35px; background: rgba(214, 238, 255, 0.85); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); border: 1px solid rgba(255, 255, 255, 0.6); font-family: 'Inter', sans-serif !important; box-sizing: border-box; flex-shrink: 0; }

    /* CỘT HÌNH ẢNH */
    .sepal-image-col { flex: 1; display: flex; justify-content: center; align-items: center; }
    .sepal-illustration-img { max-width: 100%; height: auto; border-radius: 16px; }

    /* ĐỊNH DẠNG BÊN TRONG FORM */
    .sepal-brand { font-size: 52px !important; font-weight: 800 !important; margin: 0 0 10px 0 !important; color: #0f172a !important; line-height: 1.1 !important; letter-spacing: -1.5px; }
    .sepal-desc { font-size: 15px !important; font-weight: 500 !important; line-height: 1.5 !important; margin-bottom: 35px !important; color: #334155 !important; }
    .sepal-label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
    .sepal-input-container { position: relative; margin-bottom: 20px; width: 100%; }
    
    .sepal-icon-left { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 16px; z-index: 5; }
    .sepal-icon-right { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 16px; cursor: pointer; z-index: 5; }
    
    .sepal-input-field {
        width: 100% !important; padding: 15px 45px 15px 45px !important; border: 1px solid #cbd5e1 !important;
        border-radius: 8px !important; font-family: 'Inter', sans-serif !important; font-size: 15px !important;
        color: #1e293b !important; background: #ffffff !important; box-sizing: border-box !important;
        outline: none !important; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02) !important; transition: all 0.3s ease !important;
    }
    .sepal-input-field:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2) !important; }
    
    .sepal-remember { display: flex; align-items: center; gap: 8px; margin-bottom: 25px; font-size: 14px; color: #1e293b; font-weight: 500; }
    .sepal-remember input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    
    .sepal-submit-btn {
        width: 100% !important; background-color: #1e293b !important; color: #ffffff !important;
        font-family: 'Inter', sans-serif !important; font-size: 16px !important; font-weight: 700 !important;
        padding: 16px !important; border: none !important; border-radius: 8px !important; cursor: pointer !important;
        transition: all 0.3s ease !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
    }
    .sepal-submit-btn:hover { background-color: #0f172a !important; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.15) !important; }

    /* CSS CHO MODAL CỐ VẤN */
    .sepal-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
    .sepal-modal-box { background: white; padding: 35px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; background: none; border: none; cursor: pointer; color: #94a3b8; }
    .close-btn:hover { color: #ef4444; }

    /* Responsive cho điện thoại */
    @media (max-width: 900px) {
        .sepal-main-container { flex-direction: column-reverse; margin: 30px auto; gap: 40px; }
        .sepal-nav-right, .sepal-image-col { display: none; }
    }
</style>

<script>
    // Hàm ẩn/hiện mật khẩu
    function togglePassword(inputId, icon) {
        const passField = document.getElementById(inputId);
        if (passField.type === 'password') {
            passField.type = 'text';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            passField.type = 'password';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }

    // Modal Cố Vấn
    function openTeacherModal() { 
        document.getElementById('teacher-modal').style.display = 'flex'; 
    }
    
    function closeTeacherModal() { 
        document.getElementById('teacher-modal').style.display = 'none'; 
    }

    window.onclick = function(event) {
        const modal = document.getElementById('teacher-modal');
        if (event.target == modal) closeTeacherModal();
    }

    // ==========================================
    // LOGIC ĐĂNG NHẬP CỤC BỘ BẰNG JAVASCRIPT
    // ==========================================
    function handleStaticLogin(event, role) {
        event.preventDefault(); // Chặn hành vi chuyển trang mặc định của Form

        const form = event.target;
        const btn = form.querySelector('.sepal-submit-btn');
        const errorBox = document.getElementById('error-' + role);
        const originalBtnText = btn.innerHTML;

        // Lấy giá trị tài khoản và mật khẩu người dùng vừa nhập
        const username = form.elements['log'].value.trim();
        const password = form.elements['pwd'].value;

        // Trạng thái đang tải (để tạo cảm giác giống hệ thống thật)
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
        btn.disabled = true;
        errorBox.style.display = 'none';

        // Giả lập thời gian chờ của mạng (800ms) trước khi xử lý
        setTimeout(() => {
            if (role === 'student') {
                // Kiểm tra tài khoản sinh viên
                if (username === 'sinhvien' && password === '1234') {
                    // Nếu đúng -> Chuyển hướng sang file sinhvien.html
                    window.location.href = 'sinhvien.html';
                } else {
                    // Nếu sai -> Báo lỗi
                    showLoginError(errorBox, btn, originalBtnText, 'Tên đăng nhập hoặc mật khẩu sinh viên không chính xác.');
                }
            } else if (role === 'teacher') {
                // Kiểm tra tài khoản giảng viên
                if (username === 'giangvien' && password === '1234') {
                    // Nếu đúng -> Chuyển hướng sang file giangvien.html
                    window.location.href = 'giangvien.html';
                } else {
                    // Nếu sai -> Báo lỗi
                    showLoginError(errorBox, btn, originalBtnText, 'Tài khoản hoặc mật khẩu Cố vấn không chính xác.');
                }
            }
        }, 800);
    }

    // Hàm phụ hiển thị thông báo lỗi
    function showLoginError(errorBox, btn, originalBtnText, message) {
        errorBox.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + message;
        errorBox.style.display = 'block';
        btn.innerHTML = originalBtnText;
        btn.disabled = false;
    }
</script>
